[main]
font=Inter Variable:weight=Medium:size=14,JetBrainsMono Nerd Font Mono:size=14
dpi-aware=auto
prompt=""
lines=7
width=40
line-height=24
inner-pad=4
horizontal-pad=16
vertical-pad=10
anchor=top
y-margin=8
icons-enabled=no
match-mode=fzf
sort-result=yes
show-actions=no
filter-desktop=no
list-executables-in-path=no
terminal=kitty -e
match-counter=no

[colors]
background=1a1b26ff
text=c0caf5ff
prompt=7aa2f7ff
input=ffffffff
match=7dcfffff
selection=7aa2f7ff
selection-text=1a1b26ff
selection-match=1a1b26ff
border=7aa2f7ff

[border]
width=2
radius=0

[key-bindings]
cancel=Escape Control+g
execute=Return KP_Enter
prev=Up Control+p Tab
next=Down Control+n Shift+Tab
